<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="840" viewBox="0 0 1200 840" role="img" aria-labelledby="title desc">
  <title id="title">ComplaintCare dashboard preview</title>
  <desc id="desc">A dashboard preview showing complaint statistics, a recent complaint, and an agent update.</desc>
  <rect width="1200" height="840" fill="#eef5f2"/>
  <rect x="70" y="70" width="1060" height="700" rx="18" fill="#ffffff" stroke="#d7e2de" stroke-width="3"/>
  <rect x="70" y="70" width="1060" height="75" fill="#1f2933"/>
  <text x="105" y="118" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="700">ComplaintCare</text>
  <rect x="900" y="92" width="110" height="32" rx="8" fill="#0f766e"/>
  <text x="925" y="114" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Login</text>
  <rect x="1030" y="92" width="70" height="32" rx="8" fill="#ffffff"/>
  <text x="1046" y="114" fill="#1f2933" font-family="Arial, sans-serif" font-size="18" font-weight="700">Help</text>

  <text x="110" y="240" fill="#15201d" font-family="Arial, sans-serif" font-size="54" font-weight="700">Complaint dashboard</text>
  <text x="112" y="300" fill="#5a6763" font-family="Arial, sans-serif" font-size="24">Submit, assign, track, and resolve cases in one place.</text>

  <g>
    <rect x="110" y="345" width="220" height="135" rx="12" fill="#f8fbfa" stroke="#dfe7e4" stroke-width="2"/>
    <text x="134" y="415" fill="#0f766e" font-family="Arial, sans-serif" font-size="54" font-weight="700">128</text>
    <text x="136" y="455" fill="#5a6763" font-family="Arial, sans-serif" font-size="24">Total</text>
  </g>
  <g>
    <rect x="360" y="345" width="220" height="135" rx="12" fill="#f8fbfa" stroke="#dfe7e4" stroke-width="2"/>
    <text x="384" y="415" fill="#d97706" font-family="Arial, sans-serif" font-size="54" font-weight="700">18</text>
    <text x="386" y="455" fill="#5a6763" font-family="Arial, sans-serif" font-size="24">Pending</text>
  </g>
  <g>
    <rect x="610" y="345" width="220" height="135" rx="12" fill="#f8fbfa" stroke="#dfe7e4" stroke-width="2"/>
    <text x="634" y="415" fill="#2563eb" font-family="Arial, sans-serif" font-size="54" font-weight="700">42</text>
    <text x="636" y="455" fill="#5a6763" font-family="Arial, sans-serif" font-size="24">Assigned</text>
  </g>
  <g>
    <rect x="860" y="345" width="220" height="135" rx="12" fill="#f8fbfa" stroke="#dfe7e4" stroke-width="2"/>
    <text x="884" y="415" fill="#15803d" font-family="Arial, sans-serif" font-size="54" font-weight="700">68</text>
    <text x="886" y="455" fill="#5a6763" font-family="Arial, sans-serif" font-size="24">Resolved</text>
  </g>

  <rect x="110" y="540" width="510" height="160" rx="12" fill="#f8fbfa" stroke="#dfe7e4" stroke-width="2"/>
  <text x="134" y="598" fill="#15201d" font-family="Arial, sans-serif" font-size="34" font-weight="700">Recent complaint</text>
  <text x="134" y="642" fill="#5a6763" font-family="Arial, sans-serif" font-size="24">Water supply interruption</text>
  <rect x="134" y="662" width="116" height="33" rx="8" fill="#eff6ff"/>
  <text x="153" y="685" fill="#2563eb" font-family="Arial, sans-serif" font-size="18" font-weight="700">Assigned</text>

  <rect x="680" y="540" width="405" height="160" rx="12" fill="#1f2933"/>
  <text x="708" y="598" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="700">Agent update</text>
  <rect x="708" y="618" width="332" height="44" rx="8" fill="#ffffff"/>
  <text x="726" y="648" fill="#15201d" font-family="Arial, sans-serif" font-size="24">Team visit scheduled</text>
  <rect x="708" y="680" width="162" height="34" rx="8" fill="#0f766e"/>
  <text x="738" y="704" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Resolved</text>
</svg>
